# =============================================================================
#  posts.toml  —  this is the only file you edit to publish an update.
#
#  Copy a [[post]] block, change the fields, commit & push. The Action rebuilds
#  the site automatically. Each post shows up in the home feed, the RSS feed,
#  and on the tagged person's page (e.g. tags = ["trey"] -> /trey).
#
#  Fields:
#    title  (required)  the headline
#    date   (required)  YYYY-MM-DD  (or 2026-06-09T14:30:00Z for a specific time)
#    tags   (optional)  ["trey"] / ["lori"] / ["huck"] / ["gus"] — controls which
#                       person page it lands on. Omit for a general family post.
#    body   (required)  Markdown. Use **bold**, _italics_, and [links](https://…).
#    slug   (optional)  the URL piece (post/<slug>/). Defaults to a slug of title.
# =============================================================================

[[post]]
title = "Reviving the Grandiloquent Bloviator"
date  = 2026-06-09
tags  = ["trey"]
body  = """
I've been quietly resurrecting an old project: **the Grandiloquent Bloviator**, a
blog I kept for years and then let drift offline. I rebuilt the whole archive as a
fast, static site so none of it depends on a platform sticking around.

It now lives at [gb.tlhg.org](https://gb.tlhg.org) — wander in and poke around.
"""

